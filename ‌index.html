<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Street Food App</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>🔥 Street Food</h1>
  <input type="text" id="search" placeholder="Buscar comida...">
</header>

<div class="container">

  <section id="menu"></section>

  <aside class="cart">
    <h2>🛒 Pedido</h2>
    <div id="cart-items"></div>
    <p>Total: $<span id="total">0</span></p>

    <input type="text" id="cliente" placeholder="Nombre">
    <input type="text" id="mesa" placeholder="Mesa o dirección">

    <button onclick="confirmarPedido()">Confirmar</button>
  </aside>

</div>

<script src="script.js"></script>
</body>
</html>
