<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Restaurante App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>🍽️ Restaurante App</h1>
</header>

<input type="text" id="search" placeholder="Buscar platos...">

<div id="categories"></div>

<section id="menu"></section>

<aside id="cart">
  <h2>🛒 Pedido</h2>
  <ul id="cart-items"></ul>
  <p>Total: $<span id="total">0</span></p>

  <input type="text" id="cliente" placeholder="Nombre cliente">
  <input type="text" id="mesa" placeholder="Mesa o dirección">

  <button onclick="confirmarPedido()">Confirmar Pedido</button>
</aside>

<script src="script.js"></script>
</body>
</html>
