<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔥 Street Food Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="logo">
    <i class="fa-solid fa-fire"></i>
    <span>StreetFood</span>
  </div>

  <nav>
    <a class="nav active" data-view="menu"><i class="fa-solid fa-burger"></i> Menú</a>
    <a class="nav" data-view="pedidos">
      <i class="fa-solid fa-cart-shopping"></i> Pedidos 
      <span id="cartCount" class="badge">0</span>
    </a>
    <a class="nav" data-view="reservas"><i class="fa-solid fa-calendar"></i> Reservas</a>
    <a class="nav" data-view="reportes"><i class="fa-solid fa-chart-bar"></i> Reportes</a>
  </nav>
</aside>

<!-- MAIN -->
<main class="main">
  
  <header class="header">
    <div class="left">
      <button id="toggleMenu"><i class="fa-solid fa-bars"></i></button>
      <h1 id="title">Menú</h1>
    </div>

    <div class="search">
      <i class="fa fa-search"></i>
      <input type="text" id="search" placeholder="Buscar comida...">
    </div>
  </header>

  <!-- MENU -->
  <section id="view-menu" class="view">
    <div class="menu-grid" id="menuGrid"></div>
  </section>

  <!-- PEDIDOS -->
  <section id="view-pedidos" class="view hidden">
    <div class="layout">
      <div class="menu-grid" id="menuGridPedidos"></div>

      <div class="cart">
        <h3>🛒 Pedido</h3>
        <div id="cartItems"></div>

        <p>Total: $<span id="total">0</span></p>

        <input id="cliente" placeholder="Cliente">
        <input id="mesa" placeholder="Mesa o dirección">

        <button onclick="confirmarPedido()">Confirmar</button>
      </div>
    </div>
  </section>

  <!-- RESERVAS -->
  <section id="view-reservas" class="view hidden">
    <div class="card-box">
      <h3>Nueva Reserva</h3>
      <input id="rCliente" placeholder="Cliente">
      <input id="rFecha" type="date">
      <input id="rPersonas" type="number" placeholder="Personas">
      <button onclick="crearReserva()">Guardar</button>
    </div>

    <div id="listaReservas"></div>
  </section>

  <!-- REPORTES -->
  <section id="view-reportes" class="view hidden">
    <div class="stats">
      <div class="stat">
        <h3>Total Ventas</h3>
        <p id="ventas">$0</p>
      </div>
      <div class="stat">
        <h3>Pedidos</h3>
        <p id="cantidadPedidos">0</p>
      </div>
    </div>
  </section>

</main>

<!-- 🔥 TOAST -->
<div id="toast" class="toast">Producto agregado</div>

<script src="script.js"></script>
</body>
</html>
